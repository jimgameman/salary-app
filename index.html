<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="แบ่งเงิน"/>
<title>แบ่งเงินเดือน</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #9e9d98;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 12px;
    --radius-sm: 8px;
    --green: #1d9e75;
    --red: #e24b4a;
    --red-bg: #fcebeb;
    --red-border: #f09595;
    --red-text: #a32d2d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0efe9;
      --text2: #9e9d98;
      --text3: #6b6a65;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --green: #2ec993;
      --red: #f06060;
      --red-bg: #3a1f1f;
      --red-border: #8b3535;
      --red-text: #f09595;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100dvh; }
  .shell { max-width: 480px; margin: 0 auto; background: var(--bg); min-height: 100dvh; display: flex; flex-direction: column; }
  header { padding: 16px 16px 0; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
  .tabs { display: flex; gap: 2px; background: var(--bg2); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 0; }
  .tab { flex: 1; padding: 7px; font-size: 13px; text-align: center; cursor: pointer; border-radius: 6px; border: none; background: transparent; color: var(--text2); transition: all .15s; }
  .tab.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border); }
  main { flex: 1; padding: 16px; overflow-y: auto; }
  .page { display: none; } .page.active { display: block; }

  /* รายได้ */
  .income-card { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; }
  .income-main { display: flex; align-items: center; gap: 8px; }
  .income-label { font-size: 13px; color: var(--text2); white-space: nowrap; }
  .income-input { flex: 1; border: none; background: transparent; font-size: 24px; font-weight: 600; color: var(--text); text-align: right; outline: none; width: 0; }
  .income-unit { font-size: 15px; color: var(--text2); }
  .extra-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .extra-row { display: grid; grid-template-columns: 1fr auto 28px; align-items: center; gap: 8px; }
  .extra-name { font-size: 13px; color: var(--text); background: transparent; border: none; border-bottom: 0.5px solid var(--border2); outline: none; width: 100%; padding: 3px 0; }
  .extra-val { font-size: 13px; font-weight: 500; color: var(--text); background: transparent; border: none; border-bottom: 0.5px solid var(--border2); outline: none; text-align: right; width: 90px; padding: 3px 0; }
  .add-extra-btn { display: flex; align-items: center; gap: 5px; background: transparent; border: none; font-size: 12px; color: var(--text3); cursor: pointer; padding: 6px 0; margin-top: 4px; }
  .total-income-row { display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid var(--border); margin-top: 10px; padding-top: 10px; }
  .total-income-label { font-size: 12px; color: var(--text2); }
  .total-income-val { font-size: 17px; font-weight: 600; color: var(--text); }

  .warn-bar { display: none; align-items: center; gap: 8px; background: var(--red-bg); border: 0.5px solid var(--red-border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 12px; font-size: 13px; color: var(--red-text); }
  .warn-bar.show { display: flex; }

  .sec-head { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 8px; }
  .sec-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; }
  .sec-total { font-size: 12px; color: var(--text2); }

  /* กองเงิน */
  .bucket-row { display: grid; grid-template-columns: 14px 1fr 78px 78px 24px; align-items: center; gap: 8px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 6px; }
  .bucket-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .bname { font-size: 14px; font-weight: 500; color: var(--text); background: transparent; border: none; outline: none; width: 100%; }
  .toggle { display: flex; border: 0.5px solid var(--border2); border-radius: 6px; overflow: hidden; }
  .tbtn { padding: 4px 8px; font-size: 11px; cursor: pointer; background: transparent; border: none; color: var(--text2); }
  .tbtn.active { background: var(--text); color: var(--bg); }
  .bval { font-size: 14px; border: none; background: transparent; outline: none; text-align: right; color: var(--text); width: 100%; }
  .del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; line-height: 1; padding: 0; }

  /* กองผ่อน */
  .inst-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; overflow: hidden; }
  .inst-card.due-soon { border-color: var(--red-border); }
  .inst-main { display: grid; grid-template-columns: 14px 1fr auto 24px; align-items: center; gap: 8px; padding: 12px; }
  .inst-icon { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .inst-name-input { font-size: 14px; font-weight: 500; color: var(--text); background: transparent; border: none; outline: none; width: 100%; }
  .inst-amt-display { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; }
  .inst-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 0.5px solid var(--border); }
  .meta-cell { padding: 8px 12px; display: flex; flex-direction: column; gap: 3px; border-right: 0.5px solid var(--border); }
  .meta-cell:last-child { border-right: none; }
  .meta-lbl { font-size: 10px; color: var(--text3); letter-spacing: .04em; text-transform: uppercase; }
  .meta-inp { font-size: 13px; color: var(--text); background: transparent; border: none; outline: none; width: 100%; }
  .inst-prog { padding: 6px 12px 10px; border-top: 0.5px solid var(--border); }
  .prog-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-bottom: 5px; }
  .prog-track { height: 4px; background: var(--bg2); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width .3s; }
  .due-badge { font-size: 10px; background: var(--red-bg); color: var(--red-text); padding: 2px 6px; border-radius: 4px; }

  .add-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: 0.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 9px 14px; font-size: 13px; color: var(--text2); cursor: pointer; width: 100%; margin-bottom: 4px; }

  /* สรุป */
  .result-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .rname { font-size: 13px; color: var(--text2); width: 96px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rbar-wrap { flex: 1; height: 7px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
  .rbar { height: 100%; border-radius: 4px; transition: width .3s; }
  .ramt { font-size: 13px; font-weight: 500; color: var(--text); min-width: 80px; text-align: right; }
  .remain-row { display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid var(--border); padding-top: 12px; margin-top: 6px; margin-bottom: 16px; }
  .chart-wrap { position: relative; width: 100%; height: 200px; margin-bottom: 16px; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .save-btn { padding: 12px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; }
  .copy-btn { padding: 12px; background: transparent; color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; }

  /* ประวัติ */
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--bg2); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; border: 0.5px solid transparent; margin-bottom: 6px; }
  .history-item:active { background: var(--bg3); }

  .sync-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .sync-btn { padding: 10px; background: transparent; color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .sync-btn:hover { background: var(--bg2); }
  .sync-btn.uploading { opacity: .6; pointer-events: none; }
  .sync-status { font-size: 12px; color: var(--text3); text-align: center; min-height: 18px; margin-bottom: 8px; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>
<div class="shell">
  <header>
    <h1>แบ่งเงินเดือน 💰</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('plan')">แผนการแบ่ง</button>
      <button class="tab" onclick="switchTab('history')">ประวัติ</button>
    </div>
  </header>
  <main>

    <div id="page-plan" class="page active">
      <div class="income-card">
        <div class="income-main">
          <span class="income-label">เงินเดือน</span>
          <input class="income-input" id="salary" type="number" value="30000" onblur="render()"/>
          <span class="income-unit">฿</span>
        </div>
        <div class="extra-list" id="extraList"></div>
        <button class="add-extra-btn" onclick="addExtra()">＋ เพิ่มรายได้เสริม</button>
        <div class="total-income-row">
          <span class="total-income-label">รายได้รวม</span>
          <span class="total-income-val" id="totalIncomeVal">30,000 ฿</span>
        </div>
      </div>

      <div class="warn-bar" id="warnBar"><span>⚠</span><span id="warnMsg"></span></div>

      <div class="sec-head"><span class="sec-label">กองเงิน</span><span class="sec-total" id="bTotal"></span></div>
      <div id="buckets"></div>
      <button class="add-btn" onclick="addBucket()">＋ เพิ่มกอง</button>

      <div class="sec-head"><span class="sec-label">ผ่อน / บัตรเครดิต</span><span class="sec-total" id="iTotal"></span></div>
      <div id="instCards"></div>
      <button class="add-btn" onclick="addInst()">＋ เพิ่มรายการผ่อน</button>

      <div class="sec-head"><span class="sec-label">สรุป</span></div>
      <div id="results"></div>
      <div class="chart-wrap"><canvas id="pie"></canvas></div>
      <div class="sync-row">
        <button class="sync-btn" id="uploadBtn" onclick="syncUpload()">&#9650; บันทึกขึ้น Cloud</button>
        <button class="sync-btn" id="downloadBtn" onclick="syncDownload()">&#9660; โหลดจาก Cloud</button>
      </div>
      <p class="sync-status" id="syncStatus"></p>
      <div class="btn-row">
        <button class="save-btn" id="saveBtn" onclick="saveHistory()">บันทึกเดือนนี้</button>
        <button class="copy-btn" id="copyBtn" onclick="copySummary()">Copy สรุป</button>
      </div>
      <button class="default-btn" id="defaultBtn" onclick="saveDefault()">&#128204; บันทึกเป็น default</button>
    </div>

    <div id="page-history" class="page">
      <div class="sec-head" style="margin-top:0"><span class="sec-label">ประวัติที่บันทึก</span></div>
      <div id="hlist"></div>
      <p id="no-hist" style="font-size:13px;color:var(--text3);margin-top:8px;display:none">ยังไม่มีประวัติ — กดบันทึกก่อนนะ</p>
    </div>

  </main>
</div>

<script>
const BC=['#3266ad','#1d9e75','#ba7517','#d4537e','#534ab7','#d85a30','#639922'];
const IC=['#888780','#b4b2a9','#5f5e5a','#444441'];
const DEFAULT_STATE = {
  salary: 30000,
  extras: [],
  buckets: [
    {id:1,name:'ค่าใช้จ่าย',type:'%',val:40},
    {id:2,name:'ออม/ลงทุน',type:'%',val:20},
    {id:3,name:'ท่องเที่ยว',type:'%',val:10},
  ],
  insts: []
};

let state;
try {
  const saved = localStorage.getItem('sal_app_state');
  state = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_STATE));
} catch(e) {
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
}

let extras = state.extras || [];
let buckets = state.buckets || DEFAULT_STATE.buckets;
let insts = state.insts || [];
let neid = Math.max(1, ...extras.map(e=>e.id||0)) + 1;
let nbid = Math.max(1, ...buckets.map(b=>b.id||0)) + 1;
let niid = Math.max(1, ...insts.map(i=>i.id||0)) + 1;

let history=[];
try{history=JSON.parse(localStorage.getItem('sal_app')||'[]')}catch(e){}
let pieChart=null;
const fmt=n=>Math.round(n).toLocaleString('th-TH');
const calcB=(b,s)=>b.type==='%'?s*b.val/100:b.val;
const iSum=()=>insts.reduce((a,i)=>a+i.monthly,0);
const totalIncome=()=>(parseFloat(document.getElementById('salary').value)||0)+extras.reduce((a,e)=>a+e.val,0);
const today=new Date().getDate();

function autosave(){
  try{
    localStorage.setItem('sal_app_state', JSON.stringify({
      salary: parseFloat(document.getElementById('salary').value)||0,
      extras, buckets, insts
    }));
  }catch(e){}
}

function render(){
  const total=totalIncome();
  document.getElementById('totalIncomeVal').textContent=fmt(total)+' ฿';
  renderExtras();renderBuckets(total);renderInsts();renderResults(total);
}

function renderExtras(){
  const el=document.getElementById('extraList');el.innerHTML='';
  extras.forEach((e,i)=>{
    const row=document.createElement('div');row.className='extra-row';
    row.innerHTML=`<input class="extra-name" value="${e.name}" placeholder="ชื่อรายได้" onchange="extras[${i}].name=this.value"/><input class="extra-val" type="number" value="${e.val}" onblur="extras[${i}].val=parseFloat(this.value)||0;render()"/><button class="del" onclick="extras.splice(${i},1);render()">×</button>`;
    el.appendChild(row);
  });
}
function addExtra(){
  extras.push({id:neid++,name:'รายได้เสริม',val:0});render();
  setTimeout(()=>{const n=document.querySelectorAll('.extra-name');if(n.length)n[n.length-1].focus();},50);
}

function renderBuckets(total){
  const el=document.getElementById('buckets');el.innerHTML='';let t=0;
  buckets.forEach((b,i)=>{
    const existingInput=document.querySelector(`.bval[data-id="${b.id}"]`);
    if(existingInput)b.val=parseFloat(existingInput.value)||b.val;t+=calcB(b,total);
    const d=document.createElement('div');d.className='bucket-row';
    d.innerHTML=`<div class="bucket-dot" style="background:${BC[i%BC.length]}"></div><input class="bname" value="${b.name}" onchange="buckets[${i}].name=this.value"/><div class="toggle"><button class="tbtn ${b.type==='%'?'active':''}" onclick="buckets[${i}].type='%';render()">%</button><button class="tbtn ${b.type==='฿'?'active':''}" onclick="buckets[${i}].type='฿';render()">฿</button></div><input class="bval" type="number" step="any" value="${b.val}" onblur="buckets[${i}].val=parseFloat(this.value)||0;render()"/><button class="del" onclick="buckets.splice(${i},1);render()">×</button>`;
    el.appendChild(d);
  });
  document.getElementById('bTotal').textContent='รวม '+fmt(t)+' ฿';
}
function addBucket(){buckets.push({id:nbid++,name:'กอง '+(nbid-1),type:'%',val:10});render();}

function renderInsts(){
  const el=document.getElementById('instCards');el.innerHTML='';let t=0;
  insts.forEach((inst,i)=>{t+=inst.monthly;
    const hasProg=inst.total>0&&inst.remaining>0;
    const done=inst.total-inst.remaining;
    const pct=inst.total>0?Math.round(done/inst.total*100):0;
    const dueSoon=inst.dueDay>0&&inst.dueDay>=today&&inst.dueDay-today<=3;
    const d=document.createElement('div');d.className='inst-card'+(dueSoon?' due-soon':'');
    d.innerHTML=`<div class="inst-main"><div class="inst-icon" style="background:${IC[i%IC.length]}"></div><input class="inst-name-input" value="${inst.name}" onchange="insts[${i}].name=this.value"/><span class="inst-amt-display" id="inst-disp-${inst.id}">${fmt(inst.monthly)} ฿</span><button class="del" onclick="insts.splice(${i},1);render()">×</button></div><div class="inst-meta"><div class="meta-cell"><span class="meta-lbl">฿/เดือน</span><input class="meta-inp" type="number" value="${inst.monthly}" id="inst-monthly-${inst.id}" oninput="document.getElementById('inst-disp-${inst.id}').textContent=fmt(parseFloat(this.value)||0)+' ฿'" onblur="insts[${i}].monthly=parseFloat(this.value)||0;render()"/></div><div class="meta-cell"><span class="meta-lbl">งวดที่เหลือ</span><input class="meta-inp" type="number" value="${inst.remaining||''}" placeholder="–" onblur="insts[${i}].remaining=parseInt(this.value)||0;render()"/></div><div class="meta-cell"><span class="meta-lbl">ครบวันที่</span><input class="meta-inp" type="number" min="1" max="31" value="${inst.dueDay||''}" placeholder="–" onblur="insts[${i}].dueDay=parseInt(this.value)||0;render()"/></div></div>${hasProg?`<div class="inst-prog"><div class="prog-row"><span>ผ่อนแล้ว ${done}/${inst.total} งวด${dueSoon?' <span class="due-badge">ใกล้ครบกำหนด</span>':''}</span><span>${pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${IC[i%IC.length]}"></div></div></div>`:''}`;
    el.appendChild(d);
  });
  document.getElementById('iTotal').textContent='รวม '+fmt(t)+' ฿';
}
function addInst(){insts.push({id:niid++,name:'รายการใหม่',monthly:1000,remaining:12,total:12,dueDay:0});render();}

function renderResults(total){
  const bAmts=buckets.map(b=>calcB(b,total));
  const bSum=bAmts.reduce((a,v)=>a+v,0);
  const iS=iSum();const remain=total-bSum-iS;
  const wb=document.getElementById('warnBar');
  if(total>0&&remain<0){document.getElementById('warnMsg').textContent=`กองรวมเกินรายได้ ${fmt(Math.abs(remain))} ฿`;wb.classList.add('show');}
  else wb.classList.remove('show');
  const el=document.getElementById('results');el.innerHTML='';
  const mx=Math.max(...bAmts,...insts.map(i=>i.monthly),1);
  buckets.forEach((b,i)=>{const amt=bAmts[i],pct=total>0?Math.round(amt/total*100):0;
    const r=document.createElement('div');r.className='result-row';
    r.innerHTML=`<div class="rname">${b.name}</div><div class="rbar-wrap"><div class="rbar" style="width:${Math.round(amt/mx*100)}%;background:${BC[i%BC.length]}"></div></div><div class="ramt">${fmt(amt)} ฿ <span style="font-size:11px;color:var(--text3)">(${pct}%)</span></div>`;
    el.appendChild(r);
  });
  insts.forEach((inst,i)=>{const pct=total>0?Math.round(inst.monthly/total*100):0;
    const r=document.createElement('div');r.className='result-row';
    r.innerHTML=`<div class="rname" style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:2px;background:${IC[i%IC.length]};flex-shrink:0"></span>${inst.name}</div><div class="rbar-wrap"><div class="rbar" style="width:${Math.round(inst.monthly/mx*100)}%;background:${IC[i%IC.length]}"></div></div><div class="ramt">${fmt(inst.monthly)} ฿ <span style="font-size:11px;color:var(--text3)">(${pct}%)</span></div>`;
    el.appendChild(r);
  });
  const rr=document.createElement('div');rr.className='remain-row';
  rr.innerHTML=`<span style="font-size:13px;color:var(--text2)">คงเหลือ</span><span style="font-size:16px;font-weight:600;color:${remain>=0?'var(--green)':'var(--red)'}">${fmt(remain)} ฿</span>`;
  el.appendChild(rr);
  renderPie(bAmts,iS,total,remain);
}

function renderPie(bAmts,iS,total,remain){
  const labels=buckets.map(b=>b.name),data=bAmts.map(a=>Math.max(0,Math.round(a))),colors=buckets.map((_,i)=>BC[i%BC.length]);
  insts.forEach((inst,i)=>{labels.push(inst.name);data.push(Math.max(0,Math.round(inst.monthly)));colors.push(IC[i%IC.length]);});
  if(remain>0){labels.push('คงเหลือ');data.push(Math.round(remain));colors.push('#c8c7c0');}
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById('pie'),{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'transparent'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.parsed)} ฿`}}},cutout:'62%'}});
}

function copySummary(){
  const total=totalIncome(),sal=parseFloat(document.getElementById('salary').value)||0;
  const bAmts=buckets.map(b=>calcB(b,total)),iS=iSum(),remain=total-bAmts.reduce((a,v)=>a+v,0)-iS;
  let t=`สรุปการแบ่งเงิน\n${'─'.repeat(30)}\nรายได้\n  เงินเดือน        ${fmt(sal).padStart(8)} ฿\n`;
  extras.forEach(e=>{t+=`  ${e.name.padEnd(14)} ${fmt(e.val).padStart(8)} ฿\n`;});
  t+=`  รวม             ${fmt(total).padStart(8)} ฿\n${'─'.repeat(30)}\nกองเงิน\n`;
  buckets.forEach((b,i)=>{const p=total>0?Math.round(bAmts[i]/total*100):0;t+=`  ${b.name.padEnd(14)} ${fmt(bAmts[i]).padStart(8)} ฿  (${p}%)\n`;});
  if(insts.length){t+=`\nผ่อน / บัตรเครดิต\n`;insts.forEach(inst=>{t+=`  ${inst.name.padEnd(14)} ${fmt(inst.monthly).padStart(8)} ฿${inst.dueDay?`  ครบวันที่ ${inst.dueDay}`:''}${inst.remaining?`  เหลือ ${inst.remaining} งวด`:''}\n`;});}
  t+=`${'─'.repeat(30)}\nคงเหลือ         ${fmt(remain).padStart(8)} ฿`;
  navigator.clipboard.writeText(t).then(()=>{const btn=document.getElementById('copyBtn');btn.textContent='คัดลอกแล้ว ✓';setTimeout(()=>btn.textContent='Copy สรุป',1800);}).catch(()=>alert(t));
}

function saveDefault(){
  try{
    localStorage.setItem('sal_app_state', JSON.stringify({
      salary: parseFloat(document.getElementById('salary').value)||0,
      extras, buckets, insts
    }));
  }catch(e){}
  const btn=document.getElementById('defaultBtn');
  btn.textContent='📌 บันทึกแล้ว ✓';
  setTimeout(()=>btn.textContent='📌 บันทึกเป็น default',1800);
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0eNzGH3dqdicpPsDF9AJq5fn65ibA_k4wolK_rQU6Uack7J7lmelcymeyvmS21Xc/exec';

function getAppState(){
  return {
    salary: parseFloat(document.getElementById('salary').value)||0,
    extras, buckets, insts, history
  };
}

function setStatus(msg, ok=true){
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
  if(msg) setTimeout(()=>el.textContent='', 3000);
}

async function syncUpload(){
  const btn = document.getElementById('uploadBtn');
  btn.classList.add('uploading');
  btn.textContent = '⏳ กำลังบันทึก...';
  try{
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(getAppState()),
    });
    const data = await res.json();
    if(data.ok){ setStatus('✓ บันทึกขึ้น Cloud แล้ว'); }
    else{ setStatus('เกิดข้อผิดพลาด ลองใหม่อีกครั้ง', false); }
  } catch(e){
    setStatus('เชื่อมต่อไม่ได้ ตรวจสอบเน็ต', false);
  } finally{
    btn.classList.remove('uploading');
    btn.innerHTML = '&#9650; บันทึกขึ้น Cloud';
  }
}

async function syncDownload(){
  const btn = document.getElementById('downloadBtn');
  btn.classList.add('uploading');
  btn.textContent = '⏳ กำลังโหลด...';
  try{
    const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
    const data = await res.json();
    if(data.salary !== undefined){
      extras = data.extras || [];
      buckets = data.buckets || [];
      insts = data.insts || [];
      history = data.history || [];
      document.getElementById('salary').value = data.salary || 0;
      nbid = Math.max(1, ...buckets.map(b=>b.id||0)) + 1;
      niid = Math.max(1, ...insts.map(i=>i.id||0)) + 1;
      neid = Math.max(1, ...extras.map(e=>e.id||0)) + 1;
      render();
      setStatus('✓ โหลดข้อมูลจาก Cloud แล้ว');
    } else {
      setStatus('ยังไม่มีข้อมูลบน Cloud', false);
    }
  } catch(e){
    setStatus('เชื่อมต่อไม่ได้ ตรวจสอบเน็ต', false);
  } finally{
    btn.classList.remove('uploading');
    btn.innerHTML = '&#9660; โหลดจาก Cloud';
  }
}

function saveHistory(){
  const now=new Date();
  history.unshift({date:`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`,salary:parseFloat(document.getElementById('salary').value)||0,extras:JSON.parse(JSON.stringify(extras)),buckets:JSON.parse(JSON.stringify(buckets)),insts:JSON.parse(JSON.stringify(insts))});
  if(history.length>24)history=history.slice(0,24);
  try{localStorage.setItem('sal_app',JSON.stringify(history))}catch(e){}
  renderHistPage();
  const btn=document.getElementById('saveBtn');btn.textContent='บันทึกแล้ว ✓';setTimeout(()=>btn.textContent='บันทึกเดือนนี้',1500);
}

function renderHistPage(){
  const list=document.getElementById('hlist'),none=document.getElementById('no-hist');
  list.innerHTML='';
  if(!history.length){none.style.display='block';return;}
  none.style.display='none';
  history.forEach(h=>{
    const total=(h.salary||0)+(h.extras||[]).reduce((a,e)=>a+e.val,0);
    const it=(h.insts||[]).reduce((a,i)=>a+i.monthly,0);
    const d=document.createElement('div');d.className='history-item';
    d.innerHTML=`<div><div style="font-size:12px;color:var(--text2)">${h.date}</div><div style="font-weight:600;color:var(--text)">${fmt(total)} ฿</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--text3)">ผ่อน/บัตร</div><div style="font-size:13px;color:var(--text2)">${fmt(it)} ฿</div></div>`;
    d.onclick=()=>{extras=JSON.parse(JSON.stringify(h.extras||[]));buckets=JSON.parse(JSON.stringify(h.buckets));insts=JSON.parse(JSON.stringify(h.insts||[]));document.getElementById('salary').value=h.salary||0;switchTab('plan');render();};
    list.appendChild(d);
  });
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['plan','history'][i]===t));
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  if(t==='history')renderHistPage();
}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
document.getElementById('salary').value = state.salary || 30000;
render();
</script>
